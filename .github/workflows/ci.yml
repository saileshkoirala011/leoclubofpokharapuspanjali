name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test
        env:
          NODE_ENV:                    test
          MONGODB_URI:                 mongodb://localhost:27017/leoclub_test
          REDIS_URL:                   redis://localhost:6379
          JWT_ACCESS_SECRET:           ci_access_secret_that_is_at_least_32_chars
          JWT_REFRESH_SECRET:          ci_refresh_secret_that_is_at_least_32_chars
          JWT_ACCESS_EXPIRES_IN:       15m
          JWT_REFRESH_EXPIRES_IN:      7d
          CSRF_SECRET:                 ci_csrf_secret_that_is_at_least_32_chars!!
          FRONTEND_URL:                http://localhost:3000
          SMTP_HOST:                   smtp.ethereal.email
          SMTP_PORT:                   587
          SMTP_USER:                   ""
          SMTP_PASS:                   ""
          SMTP_FROM:                   noreply@test.com
          BCRYPT_ROUNDS:               4
          MAX_LOGIN_ATTEMPTS:          5
          LOCKOUT_DURATION_MINUTES:    15
          RESET_TOKEN_EXPIRES_MINUTES: 60

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL:  http://localhost:5000/api
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  # ── E2E (Playwright) — only on main ─────────────────────────────────────────
  e2e:
    name: E2E — Playwright smoke tests
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL:  http://localhost:5000/api
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
